name: Build WebDriverAgent IPA iOS 26
on:
  workflow_dispatch: # Kích hoạt thủ công bằng nút bấm trên GitHub
    inputs:
      runner:
        description: 'macOS runner (macos-26 co Xcode kem iOS 26.5 SDK; macos-15 la du phong neu macos-26 chua san)'
        type: choice
        options:
          - macos-26
          - macos-15
        default: macos-26
jobs:
  build-wda:
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Chon Xcode moi nhat va in iOS SDK co san
        run: |
          echo "== Cac ban Xcode co san tren runner =="
          ls -d /Applications/Xcode_*.app 2>/dev/null || true
          # Chon Xcode moi nhat da cai (de lay iOS SDK moi nhat)
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$LATEST" ]; then sudo xcode-select -s "$LATEST"; fi
          echo "== Xcode dang dung =="
          xcodebuild -version
          echo "== iOS SDK co san (CAN THAY iphoneos26.5 o day) =="
          xcodebuild -showsdks | grep -i iphoneos || true

      - name: Clone Appium WebDriverAgent (ban moi nhat)
        run: |
          git clone https://github.com/appium/WebDriverAgent.git
          cd WebDriverAgent
          echo "== WebDriverAgent commit =="
          git log -1 --oneline
          # Cai dat cac thu vien can thiet
          npm install

      - name: Build WebDriverAgentRunner (No Code Signing)
        run: |
          cd WebDriverAgent
          xcodebuild build-for-testing \
            -scheme WebDriverAgentRunner \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build_output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE=""

      - name: Xac nhan app vua build cho iOS nao
        run: |
          cd WebDriverAgent
          APP=build_output/Build/Products/Debug-iphoneos/WebDriverAgentRunner-Runner.app
          echo "== Metadata build cua app (phai la 26.5) =="
          /usr/libexec/PlistBuddy -c 'Print :DTSDKName' "$APP/Info.plist" || true
          /usr/libexec/PlistBuddy -c 'Print :DTPlatformVersion' "$APP/Info.plist" || true
          /usr/libexec/PlistBuddy -c 'Print :DTXcode' "$APP/Info.plist" || true

      - name: Package to IPA
        run: |
          cd WebDriverAgent
          mkdir -p Payload
          # Sao chép file .app được tạo ra vào thư mục Payload
          cp -r build_output/Build/Products/Debug-iphoneos/WebDriverAgentRunner-Runner.app Payload/
          # Xóa các file debug symbol (.dSYM) để tránh lỗi cài đặt
          find Payload -name "*.dSYM" -exec rm -rf {} +
          # ==== FIX iOS 17+/26 ====
          # Xoa XCTest framework nhung san (build theo SDK 26.4) de app dung
          # framework XCTest CUA CHINH MAY (iOS 26.5, tu DDI). Tranh crash
          # testmanagerd o +[XCTRunnerDaemonSession sharedSession]. Can WDA >= v5.10.0.
          APP=Payload/WebDriverAgentRunner-Runner.app
          echo "== Frameworks TRUOC khi xoa =="; ls -1 "$APP/Frameworks/" || true
          rm -rf "$APP"/Frameworks/XC*.framework
          rm -rf "$APP"/Frameworks/Testing.framework
          rm -rf "$APP"/Frameworks/libXCTestSwiftSupport.dylib
          echo "== Frameworks SAU khi xoa (khong con XCTest/Testing) =="; ls -1 "$APP/Frameworks/" || true
          # Ký Ad-Hoc lai (dong dau lai bundle sau khi da xoa framework)
          codesign --force --sign - --deep Payload/WebDriverAgentRunner-Runner.app
          # Nén thư mục Payload thành file .ipa
          zip -r WebDriverAgentRunner-iOS26.ipa Payload
          echo "Đã đóng gói thành công WebDriverAgentRunner-iOS26.ipa"

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgent-iOS26
          path: WebDriverAgent/WebDriverAgentRunner-iOS26.ipa
